server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;

    # SPA: всё, что не найдено как файл, отдаём index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Хэшированные WASM/JS можно кэшировать надолго; index.html — нет.
    location ~* \.(wasm|js|css)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
