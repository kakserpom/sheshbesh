# Конфигурация Fly.io. Имя приложения замените при первом `fly launch`
# (оно должно быть уникальным глобально). Регион — ближайший к игрокам.
app = "sheshbesh"
primary_region = "fra"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
