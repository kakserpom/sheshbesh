# fly.toml app configuration file generated for sheshbesh on 2026-06-23T00:01:24+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sheshbesh'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[env]
  REDIS_URL = "redis://127.0.0.1:6379"
  PORT = "8080"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpus = 1
  memory_mb = 256
