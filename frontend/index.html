<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Шеш-Беш</title>
  <link data-trunk rel="rust" />
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
    }
    .wrap { padding: 1rem 1.5rem 2rem; }
    h1 { font-weight: 600; }
    .status { font-size: 1.1rem; margin: .4rem 0; }
    .controls { display: flex; gap: .6rem; align-items: center; margin: .6rem 0; }
    .dice { color: #94a3b8; }
    button {
      background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
      border-radius: .4rem; padding: .35rem .7rem; cursor: pointer; font: inherit;
    }
    button:hover { background: #334155; }
    /* Лотки резерва/плена */
    .trays { display: flex; flex-direction: column; gap: .3rem; margin: .6rem 0; }
    .tray-row { display: flex; align-items: center; gap: .5rem; }
    .chip {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .15rem .5rem; border-radius: .5rem; border: 1px solid #334155;
      background: #1e293b; color: #cbd5e1; font-size: .85rem;
    }
    .chip.src { border-color: #f59e0b; cursor: pointer; box-shadow: 0 0 0 1px #f59e0b inset; }
    .chip.dst { border-color: #22c55e; cursor: pointer; box-shadow: 0 0 0 1px #22c55e inset; }
    .chip.sel { border-color: #e2e8f0; cursor: pointer; box-shadow: 0 0 0 2px #e2e8f0 inset; }
    .dot { width: .7rem; height: .7rem; border-radius: 50%; display: inline-block; }

    /* Векторная доска (SVG) */
    .board {
      width: min(80vmin, 640px); height: auto;
      background: #0b1220; border-radius: .6rem; padding: .3rem;
    }
    .track { fill: #1e293b; stroke: #334155; stroke-width: .03; }
    .corner { fill: #334155; stroke: #475569; stroke-width: .03; }
    .home-gate { fill: #1e293b; stroke: #f59e0b; stroke-width: .06; }
    .home-slot { fill: none; stroke: #64748b; stroke-width: .05; stroke-dasharray: .12 .1; }
    .prison { fill: #3a1414; stroke: #f87171; stroke-width: .05; }
    .moon { fill: #15233b; stroke: #60a5fa; stroke-width: .05; }
    .moon-field { fill: #0b1830; stroke: #60a5fa; stroke-width: .05; }
    .moon-num { fill: #93c5fd; font-size: .42px; text-anchor: middle; dominant-baseline: central; }
    .checker { stroke: #0009; stroke-width: .05; }
    .captive-ring { fill: none; stroke: #ef4444; stroke-width: .08; }
    .overflow { fill: #94a3b8; font-size: .7px; text-anchor: middle; dominant-baseline: central; }
    /* Подсветка ходов и кликабельные зоны */
    .hl-src { stroke: #f59e0b; stroke-width: .07; }
    .hl-dst { stroke: #22c55e; stroke-width: .09; }
    .hl-sel { stroke: #e2e8f0; stroke-width: .1; }
    .hit { fill: transparent; cursor: pointer; }
  </style>
</head>
<body></body>
</html>
