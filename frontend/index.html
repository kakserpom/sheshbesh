<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Шеш-Беш</title>
  <link data-trunk rel="rust" />
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
    }
    .wrap { padding: 1rem 1.5rem 2rem; }
    h1 { font-weight: 600; }
    .status { font-size: 1.1rem; margin: .4rem 0; }
    .controls { display: flex; gap: .6rem; align-items: center; margin: .6rem 0; }
    .dice { color: #94a3b8; }
    button {
      background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
      border-radius: .4rem; padding: .35rem .7rem; cursor: pointer; font: inherit;
    }
    button:hover { background: #334155; }
    .moves { display: flex; flex-wrap: wrap; gap: .4rem; margin: .4rem 0 1rem; }
    .move { font-size: .85rem; }
    .board {
      display: inline-flex; flex-direction: column;
      background: #111827; padding: .5rem; border-radius: .5rem;
      font-family: ui-monospace, monospace; line-height: 1;
    }
    .row { display: flex; }
    .cell {
      width: 1.1rem; height: 1.1rem;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem;
    }
  </style>
</head>
<body></body>
</html>
