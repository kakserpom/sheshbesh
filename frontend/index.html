<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Шеш-Беш</title>
  <link data-trunk rel="rust" />
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #0f172a;
      color: #e2e8f0;
      font-family: system-ui, sans-serif;
      display: flex;
      justify-content: center;
    }
    .wrap {
      display: flex; flex-direction: column; align-items: center;
      height: 100vh; box-sizing: border-box;
      padding: .4rem .6rem; width: 100%; max-width: 1100px;
    }
    h1 { font-weight: 600; margin: .2rem 0; font-size: 1.4rem; text-align: center; }
    .status {
      display: flex; align-items: center; justify-content: center; gap: .7rem;
      font-size: 1.15rem; margin: .4rem 0; min-height: 2.1rem; text-align: center;
    }
    .herald { font-weight: 500; }
    /* Экран настроек */
    .settings { display: flex; flex-direction: column; align-items: center; gap: .8rem; margin: 2rem 0; }
    .set-row { display: flex; align-items: center; gap: .6rem; min-width: 16rem; justify-content: center; }
    .set-row b { min-width: 6rem; text-align: right; }
    button.on { background: #2563eb; border-color: #3b82f6; color: #fff; }
    button.primary { background: #16a34a; border-color: #22c55e; color: #fff; font-size: 1.1rem; padding: .5rem 1.2rem; margin-top: .6rem; }
    .controls { display: flex; gap: .6rem; align-items: center; justify-content: center; margin: .6rem 0; }
    .dev-controls { flex-wrap: wrap; max-width: 60rem; margin-left: auto; margin-right: auto; }
    .icon-btn { width: 2.2rem; height: 2.2rem; padding: 0; font-size: 1.2rem; line-height: 1; display: inline-flex; align-items: center; justify-content: center; }
    .dice { display: inline-flex; gap: .55rem; perspective: 600px; }
    .die { width: 1.8rem; height: 1.8rem; }
    .die-body { fill: #e2e8f0; stroke: #94a3b8; stroke-width: 3; }
    .die-pip { fill: #0f172a; }
    /* Настоящий 3D-кубик: 6 граней, кувыркается при броске и встаёт нужной гранью */
    .die3d { width: 1.8rem; height: 1.8rem; perspective: 600px; }
    /* transform-style тут, а сама анимация (вариант/длительность/задержка) —
       инлайном в die3d, чтобы каждая кость кувыркалась по-своему. */
    .cube { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }
    .face {
      position: absolute; width: 100%; height: 100%;
      backface-visibility: hidden;
    }
    .face .die { width: 100%; height: 100%; display: block; }
    .f-front  { transform: translateZ(.9rem); }
    .f-back   { transform: rotateY(180deg) translateZ(.9rem); }
    .f-right  { transform: rotateY(90deg)  translateZ(.9rem); }
    .f-left   { transform: rotateY(-90deg) translateZ(.9rem); }
    .f-top    { transform: rotateX(90deg)  translateZ(.9rem); }
    .f-bottom { transform: rotateX(-90deg) translateZ(.9rem); }
    /* Несколько траекторий кувырка (доп. обороты кратны 360°, поэтому итоговая
       грань не меняется); вариант выбирается случайно для каждой кости. */
    @keyframes die-roll-a {
      0%   { transform: rotateX(-140deg) rotateY(-120deg); }
      100% { transform: rotateX(calc(var(--rx) + 360deg)) rotateY(calc(var(--ry) + 720deg)); }
    }
    @keyframes die-roll-b {
      0%   { transform: rotateX(130deg)  rotateY(150deg); }
      100% { transform: rotateX(calc(var(--rx) + 720deg)) rotateY(calc(var(--ry) - 360deg)); }
    }
    @keyframes die-roll-c {
      0%   { transform: rotateX(-160deg) rotateY(110deg); }
      100% { transform: rotateX(calc(var(--rx) - 360deg)) rotateY(calc(var(--ry) + 720deg)); }
    }
    @keyframes die-roll-d {
      0%   { transform: rotateX(120deg)  rotateY(-150deg); }
      100% { transform: rotateX(calc(var(--rx) + 720deg)) rotateY(calc(var(--ry) + 360deg)); }
    }
    /* Несколько отскоков по ходу кувырка, затухающих к остановке (как настоящая
       кость, прыгающая по столу). Несколько случайно выбираемых рисунков. */
    @keyframes die-bounce-a {
      0%   { transform: translateY(0); }
      12%  { transform: translateY(-34%); }
      26%  { transform: translateY(0); }
      40%  { transform: translateY(-22%); }
      54%  { transform: translateY(0); }
      68%  { transform: translateY(-12%); }
      80%  { transform: translateY(0); }
      90%  { transform: translateY(-5%); }
      100% { transform: translateY(0); }
    }
    @keyframes die-bounce-b {
      0%   { transform: translateY(0); }
      18%  { transform: translateY(-28%); }
      32%  { transform: translateY(0); }
      46%  { transform: translateY(-18%); }
      60%  { transform: translateY(0); }
      74%  { transform: translateY(-10%); }
      86%  { transform: translateY(0); }
      94%  { transform: translateY(-4%); }
      100% { transform: translateY(0); }
    }
    @keyframes die-bounce-c {
      0%   { transform: translateY(0); }
      10%  { transform: translateY(-30%); }
      22%  { transform: translateY(0); }
      34%  { transform: translateY(-20%); }
      48%  { transform: translateY(0); }
      62%  { transform: translateY(-13%); }
      74%  { transform: translateY(0); }
      85%  { transform: translateY(-6%); }
      93%  { transform: translateY(0); }
      97%  { transform: translateY(-2%); }
      100% { transform: translateY(0); }
    }
    /* Дубль: золотая рамка + свечение. */
    .dice.double .die-body { stroke: #facc15; stroke-width: 5; }
    .dice.double { filter: drop-shadow(0 0 5px #facc15bb); }
    button {
      background: #1e293b; color: #e2e8f0; border: 1px solid #334155;
      border-radius: .4rem; padding: .35rem .7rem; cursor: pointer; font: inherit;
    }
    button:hover { background: #334155; }
    /* Лотки резерва/плена */
    /* Основная область: лотки слева, доска справа */
    .main { display: flex; flex: 1 1 auto; min-height: 0; gap: 1rem; align-items: stretch; }
    .trays { display: flex; flex-direction: column; gap: .5rem; flex: 0 0 auto; }
    .tray-row {
      display: flex; align-items: center; gap: .5rem;
      padding: .4rem .5rem; border: 1px solid #1e293b; border-radius: .5rem;
    }
    .tray-row.active { border-color: #475569; background: #172033; }
    .tray-row .dice { margin-left: auto; }
    .chip {
      display: inline-flex; align-items: center; gap: .3rem;
      padding: .15rem .5rem; border-radius: .5rem; border: 1px solid #334155;
      background: #1e293b; color: #cbd5e1; font-size: .85rem;
    }
    .chip.src { border-color: #f59e0b; cursor: pointer; box-shadow: 0 0 0 1px #f59e0b inset; }
    .chip.dst { border-color: #22c55e; cursor: pointer; box-shadow: 0 0 0 1px #22c55e inset; }
    .chip.sel { border-color: #e2e8f0; cursor: pointer; box-shadow: 0 0 0 2px #e2e8f0 inset; }
    .dot { width: .7rem; height: .7rem; border-radius: 50%; display: inline-block; }
    /* Каземат плена в лотке (нейтральный цвет) */
    .cage-chip { height: 1.15rem; width: auto; vertical-align: middle; }
    .cc-body { fill: #0b1220; stroke: #94a3b8; stroke-width: 2; }
    .cc-bar { stroke: #94a3b8; stroke-width: 1.5; opacity: .55; }

    /* Векторная доска (SVG): занимает оставшееся место, масштабируется квадратом */
    .board-area {
      flex: 1 1 auto; min-height: 0; width: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: .5rem;
    }
    /* Квадратная обёртка точно по размеру доски — для оверлея костей. */
    .board-wrap {
      position: relative;
      aspect-ratio: 1 / 1; height: 100%; width: auto;
      max-width: 100%; max-height: 100%;
    }
    .board {
      width: 100%; height: 100%;
      background: #0b1220; border-radius: .6rem;
      box-sizing: border-box;
    }
    /* Кости — HTML-оверлей над доской, спозиционированный по координатам viewBox. */
    .board-dice { position: absolute; transform: translate(-50%, -50%); pointer-events: none; }
    /* На вертикальных сторонах (Дом слева/справа) кости разворачиваем поперёк. */
    .board-dice.vert { transform: translate(-50%, -50%) rotate(90deg); }
    .track { fill: #1e293b; stroke: #334155; stroke-width: .03; }
    .corner { fill: #334155; stroke: #475569; stroke-width: .03; }
    .home-gate { fill: #1e293b; stroke-width: .06; } /* цвет рамки — через атрибут (цвет игрока) */
    .home-slot { stroke-width: .06; fill-opacity: .18; } /* цвет — через атрибут */
    .prison { fill: #2a3344; stroke: #8b9bb4; stroke-width: .05; }
    .cage { fill: #1a2230; stroke: #8b9bb4; stroke-width: .06; }
    .cage-bar { stroke: #8b9bb4; stroke-width: .04; opacity: .7; }
    .moon-end { fill: #15233b; stroke: #60a5fa; stroke-width: .05; }
    .moon-arc { fill: none; stroke: #60a5fa; stroke-width: .05; stroke-dasharray: .25 .2; opacity: .85; }
    .moon-arrow { fill: #60a5fa; }
    .moon-field { fill: #0b1830; stroke: #60a5fa; stroke-width: .05; }
    .moon-num { fill: #93c5fd; font-size: .42px; text-anchor: middle; dominant-baseline: central; }
    /* Фишки: отдельный слой с плавным переходом позиции (анимация хода) */
    .piece {
      stroke: #0009; stroke-width: .05;
      transition: cx .42s ease, cy .42s ease, opacity .2s ease;
    }
    .piece.captive { stroke: #cbd5e1; stroke-width: .09; }
    .cage-count { fill: #0b1220; font-size: .34px; font-weight: 700; text-anchor: middle; dominant-baseline: central; pointer-events: none; }
    /* Подсветка ходов и кликабельные зоны */
    .hl-src { stroke: #f59e0b; stroke-width: .07; }
    .hl-dst { stroke: #22c55e; stroke-width: .09; }
    .hl-sel { stroke: #e2e8f0; stroke-width: .1; }
    .hit { fill: transparent; cursor: pointer; }
  </style>
</head>
<body></body>
</html>
